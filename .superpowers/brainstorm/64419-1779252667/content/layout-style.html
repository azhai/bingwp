<h2>壁纸展示界面 - 布局风格选择</h2>
<p class="subtitle">为您的Bing壁纸项目选择一个简洁现代的布局方案</p>

<div class="options">
  <div class="option" data-choice="grid" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>瀑布流网格 (推荐)</h3>
      <div class="mockup" style="margin-top:12px">
        <div class="mockup-body" style="background:#f8f9fa; padding:16px; border-radius:8px">
          <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px">
            <div style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); aspect-ratio:16/9; border-radius:4px"></div>
            <div style="background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%); aspect-ratio:16/9; border-radius:4px"></div>
            <div style="background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%); aspect-ratio:16/9; border-radius:4px"></div>
            <div style="background:linear-gradient(135deg,#43e97b 0%,#38f9d7 100%); aspect-ratio:16/9; border-radius:4px"></div>
            <div style="background:linear-gradient(135deg,#fa709a 0%,#fee140 100%); aspect-ratio:16/9; border-radius:4px"></div>
            <div style="background:linear-gradient(135deg,#30cfd0 0%,#330867 100%); aspect-ratio:16/9; border-radius:4px"></div>
            <div style="background:linear-gradient(135deg,#a8edea 0%,#fed6e3 100%); aspect-ratio:16/9; border-radius:4px"></div>
            <div style="background:linear-gradient(135deg,#ff9a9e 0%,#fecfef 100%); aspect-ratio:16/9; border-radius:4px"></div>
          </div>
        </div>
      </div>
      <p style="margin-top:8px;font-size:0.9em;color:#666">响应式网格布局，自动适应屏幕宽度，图片等比缩放</p>
    </div>
  </div>

  <div class="option" data-choice="masonry" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Pinterest式瀑布流</h3>
      <div class="mockup" style="margin-top:12px">
        <div class="mockup-body" style="background:#f8f9fa; padding:16px; border-radius:8px">
          <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px">
            <div style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); aspect-ratio:3/4; border-radius:4px"></div>
            <div style="background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%); aspect-ratio:4/3; border-radius:4px"></div>
            <div style="background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%); aspect-ratio:1/1; border-radius:4px"></div>
            <div style="background:linear-gradient(135deg,#43e97b 0%,#38f9d7 100%); aspect-ratio:16/9; border-radius:4px"></div>
            <div style="background:linear-gradient(135deg,#fa709a 0%,#fee140 100%); aspect-ratio:3/5; border-radius:4px"></div>
            <div style="background:linear-gradient(135deg,#30cfd0 0%,#330867 100%); aspect-ratio:5/4; border-radius:4px"></div>
            <div style="background:linear-gradient(135deg,#a8edea 0%,#fed6e3 100%); aspect-ratio:4/3; border-radius:4px"></div>
            <div style="background:linear-gradient(135deg,#ff9a9e 0%,#fecfef 100%); aspect-ratio:1/1; border-radius:4px"></div>
          </div>
        </div>
      </div>
      <p style="margin-top:8px;font-size:0.9em;color:#666">错落有致的卡片高度，类似Pinterest的视觉效果</p>
    </div>
  </div>

  <div class="option" data-choice="timeline" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>时间线列表</h3>
      <div class="mockup" style="margin-top:12px">
        <div class="mockup-body" style="background:#f8f9fa; padding:16px; border-radius:8px">
          <div style="display:flex; flex-direction:column; gap:8px">
            <div style="display:flex; gap:12px; background:white; padding:8px; border-radius:4px; align-items:center">
              <div style="width:120px;height:80px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); border-radius:4px;flex-shrink:0"></div>
              <div style="flex:1"><div style="font-weight:bold;font-size:0.85em">粉色牵牛花里的日本树蛙</div><div style="color:#999;font-size:0.75em;margin-top:4px">2026-04-01 · 2.3MB</div></div>
            </div>
            <div style="display:flex; gap:12px; background:white; padding:8px; border-radius:4px; align-items:center">
              <div style="width:120px;height:80px;background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%); border-radius:4px;flex-shrink:0"></div>
              <div style="flex:1"><div style="font-weight:bold;font-size:0.85em">野花绽放, 中央谷地</div><div style="color:#999;font-size:0.75em;margin-top:4px">2026-04-02 · 1.8MB</div></div>
            </div>
            <div style="display:flex; gap:12px; background:white; padding:8px; border-radius:4px; align-items:center">
              <div style="width:120px;height:80px;background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%); border-radius:4px;flex-shrink:0"></div>
              <div style="flex:1"><div style="font-weight:bold;font-size:0.85em">春日樱花盛开</div><div style="color:#999;font-size:0.75em;margin-top:4px">2026-04-03 · 3.1MB</div></div>
            </div>
          </div>
        </div>
      </div>
      <p style="margin-top:8px;font-size:0.9em;color:#666">清晰的列表视图，信息密度高，适合快速浏览</p>
    </div>
  </div>
</div>
