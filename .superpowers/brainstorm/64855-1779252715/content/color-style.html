<h2>配色与视觉风格</h2>
<p class="subtitle">为瀑布流网格选择一个简洁现代的配色方案</p>

<div class="options">
  <div class="option" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>极简白底 (推荐)</h3>
      <div class="mockup" style="margin-top:12px">
        <div class="mockup-body" style="background:#ffffff; padding:20px; border-radius:8px; border:1px solid #e5e7eb">
          <div style="font-size:18px;font-weight:bold;color:#111827;margin-bottom:16px">Bing Wallpaper</div>
          <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px">
            <div style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); aspect-ratio:16/9; border-radius:6px; box-shadow:0 2px 8px rgba(0,0,0,0.08)"></div>
            <div style="background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%); aspect-ratio:16/9; border-radius:6px; box-shadow:0 2px 8px rgba(0,0,0,0.08)"></div>
            <div style="background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%); aspect-ratio:16/9; border-radius:6px; box-shadow:0 2px 8px rgba(0,0,0,0.08)"></div>
            <div style="background:linear-gradient(135deg,#43e97b 0%,#38f9d7 100%); aspect-ratio:16/9; border-radius:6px; box-shadow:0 2px 8px rgba(0,0,0,0.08)"></div>
          </div>
          <div style="margin-top:12px;font-size:13px;color:#6b7280">2026年4月 · 共30张壁纸</div>
        </div>
      </div>
      <p style="margin-top:8px;font-size:0.9em;color:#666">干净清爽，让壁纸本身成为焦点，适合图片展示类应用</p>
    </div>
  </div>

  <div class="option" data-choice="dark" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>暗色沉浸</h3>
      <div class="mockup" style="margin-top:12px">
        <div class="mockup-body" style="background:#1f2937; padding:20px; border-radius:8px">
          <div style="font-size:18px;font-weight:bold;color:#f9fafb;margin-bottom:16px">Bing Wallpaper</div>
          <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px">
            <div style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); aspect-ratio:16/9; border-radius:6px; opacity:0.95"></div>
            <div style="background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%); aspect-ratio:16/9; border-radius:6px; opacity:0.95"></div>
            <div style="background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%); aspect-ratio:16/9; border-radius:6px; opacity:0.95"></div>
            <div style="background:linear-gradient(135deg,#43e97b 0%,#38f9d7 100%); aspect-ratio:16/9; border-radius:6px; opacity:0.95"></div>
          </div>
          <div style="margin-top:12px;font-size:13px;color:#9ca3af">2026年4月 · 共30张壁纸</div>
        </div>
      </div>
      <p style="margin-top:8px;font-size:0.9em;color:#666">深色背景突出壁纸色彩，护眼且现代感强</p>
    </div>
  </div>

  <div class="option" data-choice="soft" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>柔和渐变</h3>
      <div class="mockup" style="margin-top:12px">
        <div class="mockup-body" style="background:linear-gradient(180deg,#fdf4ff 0%,#fff7ed 100%); padding:20px; border-radius:8px; border:1px solid #fce7f3">
          <div style="font-size:18px;font-weight:bold;color:#831843;margin-bottom:16px">Bing Wallpaper</div>
          <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px">
            <div style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); aspect-ratio:16/9; border-radius:6px; box-shadow:0 4px 12px rgba(168,85,247,0.15)"></div>
            <div style="background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%); aspect-ratio:16/9; border-radius:6px; box-shadow:0 4px 12px rgba(236,72,153,0.15)"></div>
            <div style="background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%); aspect-ratio:16/9; border-radius:6px; box-shadow:0 4px 12px rgba(59,130,246,0.15)"></div>
            <div style="background:linear-gradient(135deg,#43e97b 0%,#38f9d7 100%); aspect-ratio:16/9; border-radius:6px; box-shadow:0 4px 12px rgba(16,185,129,0.15)"></div>
          </div>
          <div style="margin-top:12px;font-size:13px;color:#a21caf">2026年4月 · 共30张壁纸</div>
        </div>
      </div>
      <p style="margin-top:8px;font-size:0.9em;color:#666">温暖的渐变背景，柔和的阴影，营造舒适的浏览体验</p>
    </div>
  </div>
</div>
